<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>
<h2>Админка</h2>

<div id="login">
<input id="pin" placeholder="PIN"/>
<button onclick="login()">Войти</button>
</div>

<div id="app" style="display:none;">
<h3>Записи</h3>
<div id="list"></div>
</div>

<script>
const supabaseClient = supabase.createClient("YOUR_URL","YOUR_ANON_KEY");

let state = { bookings: [] };

function login(){
  if(document.getElementById('pin').value === "1234"){
    document.getElementById('login').style.display="none";
    document.getElementById('app').style.display="block";
    load();
  }
}

async function load(){
  const {data,error} = await supabaseClient
    .from('bookings')
    .select('*')
    .order('booking_date');

  if(error){
    alert(error.message);
    return;
  }

  state.bookings = data.filter(b => b.status !== 'cancelled');
  render();
}

function render(){
  const el = document.getElementById('list');
  el.innerHTML = "";

  state.bookings.forEach(b=>{
    const div = document.createElement('div');
    div.innerHTML = `
      <b>${b.booking_date} ${b.booking_time}</b><br>
      ${b.client_name} | ${b.client_phone}<br>
      ${b.service}<br>
      ${b.comment || ''}<br>
      <button onclick="confirm('${b.id}')">Подтвердить</button>
      <button onclick="cancelBooking('${b.id}')">Отменить</button>
      <hr>
    `;
    el.appendChild(div);
  });
}

async function confirm(id){
  await supabaseClient.rpc('confirm_booking',{p_booking_id:id});
  load();
}

async function cancelBooking(id){
  await supabaseClient.rpc('delete_booking',{p_booking_id:id});
  load();
}
</script>
</body>
</html>
